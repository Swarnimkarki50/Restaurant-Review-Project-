<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | TableFind</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="topbar">
    <a class="brand" href="/">
        <span class="brand-mark">T</span>
        <span>TableFind</span>
    </a>

    <nav class="nav">
        <a href="/restaurants">Restaurants</a>
        <a href="/member/login">Log in</a>
    </nav>
</header>

<main class="container small">
    <section class="auth-card">
        <p class="eyebrow">Join TableFind</p>
        <h1>Create account</h1>
        <p>Start rating restaurants and adding your favorite local discoveries.</p>

        <p class="error" th:if="${error}" th:text="${error}"></p>

        <form action="/member/signup" method="post" class="form">
            <label for="name">Name</label>
            <input id="name" type="text" name="name" placeholder="Your name" required>

            <label for="email">Email</label>
            <input id="email" type="email" name="email" placeholder="you@example.com" required>

            <label for="password">Password</label>
            <input id="password" type="password" name="password" placeholder="Password" required>

            <button type="submit">Sign up</button>
        </form>

        <div class="form-footer">
            <a class="link-btn" href="/">Back home</a>
            <a class="link-btn" href="/member/login">Already registered?</a>
        </div>
    </section>
</main>

</body>
</html>
